<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SSAP 2.0 | Home</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#2e7d32">
    <link rel="apple-touch-icon" href="/logo.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2e7d32; --accent: #4caf50; --bg: #f4f7f6; --card: #ffffff;
            --text: #2c3e50; --border: #eeeeee; --shadow: rgba(0,0,0,0.08);
            --splash-bg: #000000; --xp-gold: #f1c40f;
        }

        [data-theme="dark"] {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --border: #333333; --shadow: rgba(0,0,0,0.4);
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; padding: 0; margin: 0; overflow-x: hidden; }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--splash-bg);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s;
            color: white; text-align: center;
        }

        .logo-container { opacity: 0; transform: translateY(20px); animation: fadeInUp 1s forwards; display: flex; flex-direction: column; align-items: center; }
        #splash-logo {
            width: 160px;
            height: auto;
            border-radius: 20px; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); 
            background: white; 
            padding: 10px; 
        }
        #splash-video { width: 300px; max-width: 85%; height: auto; display: none; margin: 0 auto 15px auto; }

        .logo-text { font-size: 2.2rem; font-weight: 200; text-transform: uppercase; letter-spacing: 6px; margin: 0; }
        .loading-bar-mini { width: 100px; height: 2px; background: #333; margin: 20px auto; position: relative; overflow: hidden; }
        .loading-bar-mini::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: var(--accent); animation: loading 2s infinite; }

        @keyframes loading { to { left: 100%; } }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .splash-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* --- TABS --- */
        .nav-tabs { display: flex; background: #000; padding: 10px 20px; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .tab-btn { background: transparent; border: none; color: #666; padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; transition: 0.2s; touch-action: manipulation; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid var(--accent); }

        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; opacity: 0; transition: opacity 1s ease-in; }
        .app-loaded .container { opacity: 1; }
        .page { display: none; }
        .page.active { display: block; }

        /* --- UI COMPONENTS --- */
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .input-card { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px var(--shadow); border: 1px solid var(--border); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .full { grid-column: 1 / -1; }
        label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 0.7rem; color: var(--primary); text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); box-sizing: border-box; }
        .btn-add { background: var(--primary); color: white; padding: 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.1s transform; touch-action: manipulation; }
        .btn-add:active { transform: scale(0.97); }

        /* --- GAMIFIED LEADERBOARD --- */
        .leaderboard { 
            background: #1a1a1a; 
            color: white; 
            padding: 25px 15px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            border-bottom: 4px solid var(--xp-gold);
            text-align: center;
        }

        #alien-container {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        #leaderboard-alien {
            font-size: 60px;
            animation: alienFloat 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes alienFloat {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }

        .leaderboard-ranks {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            text-align: left;
        }

        .rank-card {
            background: rgba(255,255,255,0.05);
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid var(--xp-gold);
        }

        /* --- FULL LEADERBOARD STYLES --- */
        .view-all-btn {
            background: transparent;
            border: 1px solid var(--xp-gold);
            color: var(--xp-gold);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.3s;
            touch-action: manipulation;
        }
        .view-all-btn:hover { background: var(--xp-gold); color: #000; }

        .full-rank-list {
            display: none; 
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed rgba(255,255,255,0.1);
            text-align: left;
        }
        .full-rank-list.show { display: block; }

        .rank-item-mini {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }

        /* --- XP & CARDS --- */
        .xp-badge { background: var(--xp-gold); color: #000; padding: 2px 8px; border-radius: 12px; font-weight: 900; font-size: 0.7rem; }
        .student-card { background: var(--card); border-radius: 10px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); position: relative; transition: 0.1s; }
        .section-label { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; margin-top: 15px; color: var(--accent); }
        .status-badge { font-size: 0.6rem; color: white; padding: 3px 8px; border-radius: 4px; font-weight: bold; display: inline-block; margin-top: 10px; }

        /* --- DUCK PAGE --- */
        .duck-box { text-align: center; margin-bottom: 20px; }
        #the-duck { font-size: 3.5rem; cursor: pointer; display: inline-block; transition: 0.1s; user-select: none; touch-action: manipulation; }
        #the-duck:active { transform: scale(1.2); }
        .comment-card { background: #fffde7; border-left: 4px solid #fbc02d; padding: 15px; margin-bottom: 10px; border-radius: 4px; color: #333; }

        /* Improved delete buttons: bigger tap area, higher z-index */
        .delete-btn, .edit-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            min-height: 44px;
            background: transparent;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            touch-action: manipulation;
            border-radius: 8px;
            transition: background 0.1s;
            z-index: 10;
            position: relative;
        }
        .delete-btn:active, .edit-btn:active { background: rgba(0,0,0,0.1); }
        .action-bar { display: flex; gap: 8px; align-items: center; }

        .no-export { display: none !important; }

        /* --- FIXED PRINT STYLES - NO OVERLAP --- */
        @media print {
            body * {
                visibility: hidden;
            }
            .print-area, .print-area * {
                visibility: visible;
            }
            .print-area {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                margin: 0;
                padding: 20px;
                background: white;
                color: black;
                display: block;
                overflow: visible;
                box-sizing: border-box;
            }
            .print-area .student-card {
                break-inside: avoid;
                page-break-inside: avoid;
                border: 1px solid #ccc;
                margin-bottom: 20px !important;
                display: block;
                clear: both;
                overflow: visible;
                page-break-after: avoid;
            }
        }
    </style>
</head>
<body data-theme="light">

<div id="splash-screen">
    <div class="logo-container">
        <img id="splash-logo" src="logo.png" alt="SSAP Logo">
        <video id="splash-video" muted playsinline preload="auto">
            <source src="animation.mp4" type="video/mp4">
        </video>
        <h1 class="logo-text">SSAP 2.0</h1>
        <div class="loading-bar-mini" id="loader"></div>
        <button id="start-btn" style="background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; display: none;">Tap to start</button>
    </div>
</div>

<audio id="startup-sound" src="startup.mp3"></audio>

<nav class="nav-tabs">
    <button class="tab-btn active" data-page="daily">📅 Daily</button>
    <button class="tab-btn" data-page="monthly">📊 Monthly SSAP</button>
    <button class="tab-btn" data-page="bonus">🦆 Bonus</button>
</nav>

<div class="container">
    <div class="header-box">
        <h2 style="margin:0; font-weight: 300;">SSAP <span style="color:var(--primary); font-weight: 800;">2.0</span></h2>
        <button class="theme-btn" id="themeToggleBtn" style="background: var(--card); border: 1px solid var(--border); padding: 5px 15px; border-radius: 20px; cursor: pointer; touch-action: manipulation;">🌙 Dark</button>
    </div>

    <div id="page-daily" class="page active">
        <div class="leaderboard" id="xpLeaderboard">
             <div id="alien-container"><span id="leaderboard-alien">👾</span></div>
             <div id="leaderboard-content">🏆 XP Leaderboard: Loading...</div>
             <button class="view-all-btn" id="viewAllRankBtn">View Full Rankings</button>
             <div id="full-leaderboard" class="full-rank-list"></div>
        </div>

        <div class="input-card">
            <form id="dailyForm">
                <div class="form-grid">
                    <div><label>Name</label><input type="text" id="d-name" required></div>
                    <div><label>STI</label><input type="text" id="d-sti"></div>
                    <div><label>Date</label><input type="date" id="d-date"></div>
                    <div class="full"><label>XP Change (+/-)</label><input type="text" inputmode="decimal" id="d-xp" value="0"></div>
                    <div class="full"><label>Notes / Behavior</label><textarea id="d-notes" rows="2"></textarea></div>
                </div>
                <button type="submit" class="btn-add" id="dailySubmitBtn">Log Daily Activity</button>
            </form>
        </div>
        <div class="form-grid" style="margin-bottom: 20px;">
            <input type="text" id="searchDaily" placeholder="Filter by name/STI..." oninput="renderDaily()">
        </div>
        <div id="dailyList"></div>
    </div>

    <div id="page-monthly" class="page">
        <div class="input-card">
            <form id="studentForm">
                <div class="form-grid">
                    <div><label>Name</label><input type="text" id="name" required></div>
                    <div><label>STI</label><input type="text" id="sti"></div>
                    <div><label>Unit</label><input type="text" id="unit"></div>
                    <div class="full"><label>Course</label><input type="text" id="course"></div>
                    <div class="full"><label>L & S</label><textarea id="ls" rows="2"></textarea></div>
                    <div class="full"><label>R & W</label><textarea id="rw" rows="2"></textarea></div>
                    <div class="full"><label>Overall</label><textarea id="overall" rows="2"></textarea></div>
                    <div class="full">
                        <select id="statusOverride">
                            <option value="auto">🤖 Auto-Detect</option>
                            <option value="good">🟢 Excelling</option>
                            <option value="developing">🟡 Developing</option>
                            <option value="support">🔴 Support Needed</option>
                        </select>
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="btn-add">Save Monthly Record</button>
            </form>
        </div>
        <input type="text" id="searchInput" class="search-input" style="width:100%; padding:10px; border-radius:20px; border:1px solid var(--border); margin-bottom:20px;" placeholder="Search names..." oninput="renderMonthly()">
        <div id="studentList"></div>

        <div class="input-card" id="pdfExportCard" style="margin-top: 20px; background: var(--card);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <label style="margin:0; font-size: 1rem;">📄 Export Students to PDF</label>
                <button id="refreshStudentListBtn" style="background: var(--accent); border: none; padding: 5px 12px; border-radius: 20px; cursor: pointer; touch-action: manipulation;">⟳ Refresh List</button>
            </div>
            <select id="studentSelectForPdf" multiple size="5" style="width:100%; margin-bottom: 15px; padding: 8px;">
            </select>
            <button id="exportPdfBtn" class="btn-add" style="background: #ff9800; margin-top: 0;">Export Selected to PDF (Print)</button>
            <p style="font-size: 0.7rem; opacity: 0.7; margin-top: 10px;">💡 Hold Ctrl (or Cmd) to select multiple students → click button → choose "Save as PDF".</p>
        </div>
    </div>

    <div id="page-bonus" class="page">
        <div class="duck-box">
            <div id="the-duck" style="cursor:pointer;">🦆</div>
            <p style="font-size:0.6rem; opacity:0.5">This duck quacks 8 times!</p>
        </div>
        <div class="input-card">
            <form id="bonusForm">
                <label>Student Name</label><input type="text" id="b-name" required><br><br>
                <label>Q&A / English Note</label><textarea id="b-msg" rows="3"></textarea>
                <button type="submit" class="btn-add" style="background:#f1c40f; color:#000;">Post to Wall</button>
            </form>
        </div>
        <div id="bonusList"></div>
    </div>
</div>

<script>
    // ----------------------------- SOUND SETUP ---------------------------------
    const CUSTOM_PIPE_URL = "cartoon pipe.wav";
    let audioCtx = null;
    let soundAllowed = false;
    
    function initAudio() {
        if (audioCtx) return audioCtx;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        } catch(e) { console.warn("Web Audio not supported"); return null; }
    }
    
    function playPowerUpSound() {
        if (!soundAllowed) return;
        const ctx = initAudio();
        if (!ctx) return;
        if (ctx.state === 'suspended') ctx.resume();
        const now = ctx.currentTime;
        const gainNode = ctx.createGain();
        gainNode.gain.setValueAtTime(0.25, now);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
        gainNode.connect(ctx.destination);
        const freqs = [523.25, 659.25, 783.99, 1046.50];
        freqs.forEach((freq, idx) => {
            const osc = ctx.createOscillator();
            osc.type = 'square';
            osc.frequency.value = freq;
            osc.connect(gainNode);
            osc.start(now + idx * 0.08);
            osc.stop(now + idx * 0.08 + 0.25);
        });
        const osc2 = ctx.createOscillator();
        osc2.type = 'triangle';
        osc2.frequency.value = 880;
        osc2.connect(gainNode);
        osc2.start(now + 0.2);
        osc2.stop(now + 0.35);
    }
    
    function playCustomPipeSound() {
        if (!soundAllowed) return;
        try {
            const audio = new Audio(CUSTOM_PIPE_URL);
            audio.volume = 0.5;
            audio.play().catch(() => playSynthPipeFallback());
        } catch(e) {
            playSynthPipeFallback();
        }
    }
    
    function playSynthPipeFallback() {
        if (!soundAllowed) return;
        const ctx = initAudio();
        if (!ctx) return;
        if (ctx.state === 'suspended') ctx.resume();
        const now = ctx.currentTime;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
        gain.connect(ctx.destination);
        const osc = ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(200, now + 0.35);
        osc.connect(gain);
        osc.start(now);
        osc.stop(now + 0.45);
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 800;
        osc.connect(filter);
        filter.connect(gain);
    }
    
    function enableSoundsOnFirstClick() {
        if (soundAllowed) return;
        soundAllowed = true;
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        const ctx = initAudio();
        if (ctx && ctx.state !== 'running') ctx.resume();
    }
    document.body.addEventListener('click', () => { enableSoundsOnFirstClick(); }, { once: true });
    document.body.addEventListener('touchstart', () => { enableSoundsOnFirstClick(); }, { once: true });
    
    // ----------------------------- APP DATA -----------------------------
    let appData = { students: [], daily: [], bonus: [] };
    let editIdx = null;
    let duckCount = 0;
    let isAdmin = false;
    
    async function syncCloud(method, data = null) {
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (data) options.body = JSON.stringify(data);
        const res = await fetch('/api/data', options);
        return method === 'GET' ? await res.json() : null;
    }
    
    async function initApp() {
        if (!navigator.onLine) { loadLocalBackup(); renderAll(); return; }
        try {
            const cloudData = await syncCloud('GET');
            if (cloudData && cloudData.students) appData = cloudData;
            else loadLocalBackup();
            renderAll();
        } catch (e) { loadLocalBackup(); renderAll(); }
    }
    
    function loadLocalBackup() {
        appData.students = JSON.parse(localStorage.getItem('stu_final_v2')) || [];
        appData.daily = JSON.parse(localStorage.getItem('stu_daily')) || [];
        appData.bonus = JSON.parse(localStorage.getItem('stu_bonus')) || [];
    }
    
    async function triggerSave() {
        if (navigator.onLine) await syncCloud('POST', appData);
        localStorage.setItem('stu_final_v2', JSON.stringify(appData.students));
        localStorage.setItem('stu_daily', JSON.stringify(appData.daily));
        localStorage.setItem('stu_bonus', JSON.stringify(appData.bonus));
    }
    
    function hideSplash() {
        document.getElementById('splash-screen').classList.add('splash-hidden');
        document.body.classList.add('app-loaded');
    }
    
    window.addEventListener('load', () => {
        const startBtn = document.getElementById('start-btn');
        const video = document.getElementById('splash-video');
        const logo = document.getElementById('splash-logo');
        const audioEl = document.getElementById('startup-sound');
        document.getElementById('loader').style.display = 'none';
        startBtn.style.display = 'inline-block';
        startBtn.addEventListener('click', () => {
            // NO SOUND on start button
            audioEl.play().catch(e => {}); 
            logo.style.display = 'none';
            document.querySelector('.logo-text').style.display = 'none';
            video.style.display = 'block';
            video.play().catch(e => hideSplash());
            startBtn.style.display = 'none';
            video.onended = hideSplash; 
            setTimeout(hideSplash, 5000); 
            initApp(); 
        });
    });
    
    function showPage(pageId) {
        playPowerUpSound();
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(btn => btn.getAttribute('data-page') === pageId);
        if (activeBtn) activeBtn.classList.add('active');
        if (pageId === 'monthly') setTimeout(populateStudentSelect, 50);
        renderAll();
    }
    
    function toggleFullLeaderboard() {
        playPowerUpSound();
        const list = document.getElementById('full-leaderboard');
        const btn = document.getElementById('viewAllRankBtn');
        list.classList.toggle('show');
        btn.innerText = list.classList.contains('show') ? "Hide Rankings" : "View Full Rankings";
    }
    
    // Daily form
    document.getElementById('dailyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const xpNum = parseInt(document.getElementById('d-xp').value) || 0;
        if (xpNum < 0) playCustomPipeSound();
        else playPowerUpSound();
        const entry = {
            name: document.getElementById('d-name').value.trim(),
            sti: document.getElementById('d-sti').value,
            date: document.getElementById('d-date').value || new Date().toISOString().split('T')[0],
            xp: xpNum,
            notes: document.getElementById('d-notes').value
        };
        appData.daily.unshift(entry);
        await triggerSave(); 
        e.target.reset(); 
        document.getElementById('d-xp').value = "0";
        renderDaily();
    });
    
    function renderDaily() {
        const list = document.getElementById('dailyList');
        const leaderboardUI = document.getElementById('leaderboard-content');
        const fullLeaderboardUI = document.getElementById('full-leaderboard');
        const search = document.getElementById('searchDaily').value.toLowerCase();
        list.innerHTML = '';
        
        const totals = {};
        appData.daily.forEach(l => { totals[l.name] = (totals[l.name] || 0) + l.xp; });
        const allSorted = Object.entries(totals).sort((a,b) => b[1]-a[1]);
        const top = allSorted.slice(0,3);
        if(top.length > 0) {
            leaderboardUI.innerHTML = `<div style="font-weight:800; color:var(--xp-gold); margin-bottom:10px;">TOP PERFORMERS</div>
                <div class="leaderboard-ranks">${top.map((t,i)=>`<div class="rank-card"><span>${i+1}. ${t[0]}</span><span class="xp-badge">${t[1]} XP</span></div>`).join('')}</div>`;
            fullLeaderboardUI.innerHTML = allSorted.map((t,i)=>`<div class="rank-item-mini"><span>${i+1}. ${t[0]}</span><span style="color:var(--xp-gold);">${t[1]} XP</span></div>`).join('');
        } else {
            leaderboardUI.innerHTML = "🏆 No XP data yet.";
            fullLeaderboardUI.innerHTML = "";
        }
        
        appData.daily.forEach((l, i) => {
            if(!l.name.toLowerCase().includes(search) && !l.sti.includes(search)) return;
            const xpSign = l.xp > 0 ? '+' : '';
            list.innerHTML += `<div class="student-card" data-daily-index="${i}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><strong>${escapeHtml(l.name)}</strong> <span class="xp-badge" style="background:${l.xp<0?'#d32f2f':'var(--xp-gold)'}">${xpSign}${l.xp} XP</span>
                    <div style="font-size:0.8rem; opacity:0.6">${l.date}</div></div>
                    <div class="action-bar">
                        <button class="delete-btn" data-type="daily" data-index="${i}" aria-label="Delete">🗑️</button>
                    </div>
                </div>
                <div>${escapeHtml(l.notes)}</div>
            </div>`;
        });
        attachDeleteEvents();
    }
    
    function getStatus(txt, override) {
        if (override !== "auto") {
            const map = { good: ["Excelling", "#2e7d32"], developing: ["Developing", "#ffa000"], support: ["Support Needed", "#d32f2f"] };
            return { label: map[override][0], color: map[override][1] };
        }
        const t = (txt || "").toLowerCase();
        if (["tốt", "vượt trội", "good", "excellent"].some(w => t.includes(w))) return { label: "Excelling", color: "#2e7d32" };
        if (["yếu", "cần hỗ trợ", "support", "weak"].some(w => t.includes(w))) return { label: "Support Needed", color: "#d32f2f" };
        return { label: "Developing", color: "#ffa000" };
    }
    
    document.getElementById('studentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        playPowerUpSound();
        const data = {
            name: document.getElementById('name').value, sti: document.getElementById('sti').value,
            unit: document.getElementById('unit').value, course: document.getElementById('course').value,
            ls: document.getElementById('ls').value, rw: document.getElementById('rw').value,
            overall: document.getElementById('overall').value, statusOverride: document.getElementById('statusOverride').value
        };
        if (editIdx !== null) { appData.students[editIdx] = data; editIdx = null; } 
        else { appData.students.unshift(data); }
        await triggerSave();
        e.target.reset(); renderMonthly(); populateStudentSelect();
    });
    
    function renderMonthly() {
        const list = document.getElementById('studentList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = '';
        appData.students.forEach((s, i) => {
            if (!s.name.toLowerCase().includes(search) && !s.sti.toLowerCase().includes(search)) return;
            const status = getStatus(s.overall, s.statusOverride || "auto");
            list.innerHTML += `<div class="student-card" data-monthly-index="${i}">
                <div style="display:flex; justify-content:space-between;">
                    <div><h3>${escapeHtml(s.name)} <span style="opacity:0.5;">#${escapeHtml(s.sti||'000')}</span></h3></div>
                    <div class="action-bar">
                        <button class="edit-btn" data-edit-index="${i}" aria-label="Edit">⋮</button>
                        <button class="delete-btn" data-type="monthly" data-index="${i}" aria-label="Delete">🗑️</button>
                    </div>
                </div>
                <div class="section-label">Listening & Speaking</div><div>${escapeHtml(s.ls||'N/A')}</div>
                <div class="section-label">Reading & Writing</div><div>${escapeHtml(s.rw||'N/A')}</div>
                <div class="section-label">Overall</div><div>${escapeHtml(s.overall||'N/A')}</div>
                <div class="status-badge" style="background:${status.color}">${status.label}</div>
            </div>`;
        });
        attachEditEvents();
        attachDeleteEvents();
    }
    
    function attachEditEvents() {
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.removeEventListener('click', handleEditClick);
            btn.addEventListener('click', handleEditClick);
        });
    }
    function handleEditClick(e) {
        e.stopPropagation();
        const idx = parseInt(e.currentTarget.getAttribute('data-edit-index'));
        if (!isNaN(idx)) editStudent(idx);
    }
    
    function editStudent(i) {
        playPowerUpSound();
        const s = appData.students[i];
        document.getElementById('name').value = s.name; document.getElementById('sti').value = s.sti;
        document.getElementById('unit').value = s.unit; document.getElementById('course').value = s.course;
        document.getElementById('ls').value = s.ls; document.getElementById('rw').value = s.rw;
        document.getElementById('overall').value = s.overall;
        document.getElementById('statusOverride').value = s.statusOverride || "auto";
        editIdx = i; window.scrollTo(0,0);
    }
    
    function duckSecret() {
        playPowerUpSound();
        duckCount++;
        if(duckCount === 8) { isAdmin = !isAdmin; alert(isAdmin ? "ADMIN UNLOCKED" : "ADMIN LOCKED"); duckCount = 0; renderBonus(); }
    }
    
    document.getElementById('bonusForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        playPowerUpSound();
        appData.bonus.unshift({ name: document.getElementById('b-name').value, msg: document.getElementById('b-msg').value, date: new Date().toLocaleString() });
        await triggerSave(); e.target.reset(); renderBonus();
    });
    
    function renderBonus() {
        const list = document.getElementById('bonusList');
        list.innerHTML = '';
        appData.bonus.forEach((b, i) => {
            list.innerHTML += `<div class="comment-card" data-bonus-index="${i}">
                <div style="display:flex; justify-content:space-between;">
                    <div><strong>${escapeHtml(b.name)}</strong> <span style="font-size:0.6rem;">${escapeHtml(b.date)}</span></div>
                    ${isAdmin ? `<button class="delete-btn" data-type="bonus" data-index="${i}" aria-label="Delete">❌</button>` : ''}
                </div>
                <p>"${escapeHtml(b.msg)}"</p>
            </div>`;
        });
        attachDeleteEvents();
    }
    
    // Universal delete handler using event delegation + custom pipe sound
    function attachDeleteEvents() {
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.removeEventListener('click', handleDeleteClick);
            btn.addEventListener('click', handleDeleteClick);
        });
    }
    async function handleDeleteClick(e) {
        e.stopPropagation();
        if (!confirm("Delete this record?")) return;
        const type = e.currentTarget.getAttribute('data-type');
        const idx = parseInt(e.currentTarget.getAttribute('data-index'));
        if (isNaN(idx)) return;
        playCustomPipeSound();  // always custom pipe for any deletion
        if (type === 'daily') appData.daily.splice(idx, 1);
        else if (type === 'monthly') appData.students.splice(idx, 1);
        else if (type === 'bonus') appData.bonus.splice(idx, 1);
        await triggerSave();
        renderAll();
        if (type === 'monthly') populateStudentSelect();
    }
    
    function toggleTheme() {
        playPowerUpSound();
        const isLight = document.body.getAttribute('data-theme') === 'light';
        document.body.setAttribute('data-theme', isLight ? 'dark' : 'light');
        document.getElementById('themeToggleBtn').innerText = isLight ? "☀️ Light" : "🌙 Dark";
    }
    
    function renderAll() { renderDaily(); renderMonthly(); renderBonus(); }
    document.getElementById('d-date').valueAsDate = new Date();
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }
    
    function populateStudentSelect() {
        const select = document.getElementById('studentSelectForPdf');
        if (!select) return;
        select.innerHTML = '';
        appData.students.forEach((student, idx) => {
            const option = document.createElement('option');
            option.value = idx;
            option.textContent = `${student.name} (${student.sti || 'No STI'})`;
            select.appendChild(option);
        });
        if (appData.students.length === 0) {
            const option = document.createElement('option');
            option.textContent = 'No students yet';
            option.disabled = true;
            select.appendChild(option);
        }
    }
    
    function exportToPDFViaPrint() {
        playPowerUpSound();
        const select = document.getElementById('studentSelectForPdf');
        const selectedIndices = Array.from(select.selectedOptions).map(opt => parseInt(opt.value));
        if (selectedIndices.length === 0) {
            alert('Please select at least one student.');
            return;
        }
        const studentsToExport = selectedIndices.map(i => appData.students[i]).filter(s => s);
        if (studentsToExport.length === 0) return;
        
        const printDiv = document.createElement('div');
        printDiv.className = 'print-area';
        printDiv.style.position = 'absolute';
        printDiv.style.top = '0';
        printDiv.style.left = '0';
        printDiv.style.width = '100%';
        printDiv.style.backgroundColor = 'white';
        printDiv.style.padding = '20px';
        printDiv.style.boxSizing = 'border-box';
        printDiv.style.zIndex = '99999';
        
        const title = document.createElement('h1');
        title.textContent = 'SSAP 2.0 - Student Report';
        title.style.textAlign = 'center';
        title.style.color = '#2e7d32';
        title.style.marginBottom = '30px';
        printDiv.appendChild(title);
        
        studentsToExport.forEach(student => {
            const status = getStatus(student.overall, student.statusOverride || "auto");
            const card = document.createElement('div');
            card.className = 'student-card';
            card.style.background = '#fff';
            card.style.border = '1px solid #ccc';
            card.style.borderRadius = '12px';
            card.style.padding = '20px';
            card.style.marginBottom = '20px';
            card.style.pageBreakInside = 'avoid';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:15px;">
                    <div><h3 style="margin:0;">${escapeHtml(student.name)} <span style="opacity:0.5;">#${escapeHtml(student.sti || '000')}</span></h3></div>
                </div>
                <div style="font-size:0.7rem; font-weight:900; text-transform:uppercase; margin-top:15px; color:#2e7d32;">Listening & Speaking</div>
                <div>${escapeHtml(student.ls || 'N/A')}</div>
                <div style="font-size:0.7rem; font-weight:900; text-transform:uppercase; margin-top:15px; color:#2e7d32;">Reading & Writing</div>
                <div>${escapeHtml(student.rw || 'N/A')}</div>
                <div style="font-size:0.7rem; font-weight:900; text-transform:uppercase; margin-top:15px; color:#2e7d32;">Overall</div>
                <div>${escapeHtml(student.overall || 'N/A')}</div>
                <div style="font-size:0.6rem; color:white; padding:3px 8px; border-radius:4px; display:inline-block; margin-top:10px; background:${status.color}">${status.label}</div>
            `;
            printDiv.appendChild(card);
        });
        
        document.body.appendChild(printDiv);
        window.print();
        setTimeout(() => { document.body.removeChild(printDiv); }, 1000);
    }
    
    // attach global listeners
    document.getElementById('viewAllRankBtn')?.addEventListener('click', toggleFullLeaderboard);
    document.getElementById('refreshStudentListBtn')?.addEventListener('click', () => { playPowerUpSound(); populateStudentSelect(); });
    document.getElementById('exportPdfBtn')?.addEventListener('click', exportToPDFViaPrint);
    document.getElementById('themeToggleBtn')?.addEventListener('click', toggleTheme);
    document.getElementById('the-duck')?.addEventListener('click', duckSecret);
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const page = btn.getAttribute('data-page');
            if(page) showPage(page);
        });
    });
    
    populateStudentSelect();
    document.getElementById('d-date').valueAsDate = new Date();
    initApp();
</script>
</body>
</html>
