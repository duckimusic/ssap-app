<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSAP 2.0 | Home</title>
    
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#2e7d32">
    <link rel="apple-touch-icon" href="/logo.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2e7d32; --accent: #4caf50; --bg: #f4f7f6; --card: #ffffff;
            --text: #2c3e50; --border: #eeeeee; --shadow: rgba(0,0,0,0.08);
            --splash-bg: #000000; --xp-gold: #f1c40f; --waitlist-color: #607d8b;
        }

        [data-theme="dark"] {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --border: #333333; --shadow: rgba(0,0,0,0.4);
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; padding: 0; margin: 0; overflow-x: hidden; }
        
        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--splash-bg); display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease-out, visibility 0.8s; color: white; text-align: center;
        }
        .logo-container { opacity: 0; transform: translateY(20px); animation: fadeInUp 1s forwards; display: flex; flex-direction: column; align-items: center; }
        #splash-logo { width: 140px; height: auto; border-radius: 20px; margin-bottom: 20px; }
        
        /* Video mặc định ẩn, sẽ hiện khi bấm nút */
        #splash-video { 
            width: 320px; max-width: 85%; height: auto; 
            display: none; 
            margin: 0 auto 15px auto; 
        }

        .logo-text { font-size: 2.2rem; font-weight: 200; text-transform: uppercase; letter-spacing: 6px; margin: 0; }
        .loading-bar-mini { width: 100px; height: 2px; background: #333; margin: 20px auto; position: relative; overflow: hidden; }
        .loading-bar-mini::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: var(--accent); animation: loading 2s infinite; }
        
        @keyframes loading { to { left: 100%; } }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .splash-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* --- TABS --- */
        .nav-tabs { display: flex; background: #000; padding: 10px 10px; gap: 5px; position: sticky; top: 0; z-index: 1000; overflow-x: auto; white-space: nowrap; }
        .tab-btn { background: transparent; border: none; color: #666; padding: 12px 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 1px; flex-shrink: 0; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid var(--accent); }

        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; opacity: 0; transition: opacity 1s ease-in; }
        .app-loaded .container { opacity: 1; }
        .page { display: none; }
        .page.active { display: block; }

        /* --- UI COMPONENTS --- */
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .input-card { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px var(--shadow); border: 1px solid var(--border); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .full { grid-column: 1 / -1; }
        label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 0.7rem; color: var(--primary); text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); box-sizing: border-box; }
        .btn-add { background: var(--primary); color: white; padding: 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }

        /* --- LEADERBOARD --- */
        .leaderboard { background: #1a1a1a; color: white; padding: 25px 15px; border-radius: 12px; margin-bottom: 20px; border-bottom: 4px solid var(--xp-gold); text-align: center; }
        #leaderboard-alien { font-size: 60px; animation: alienFloat 3s ease-in-out infinite; display: inline-block; }
        @keyframes alienFloat { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-12px) rotate(2deg); } }
        .leaderboard-ranks { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; text-align: left; }
        .rank-card { background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--xp-gold); }
        .view-all-btn { background: transparent; border: 1px solid var(--xp-gold); color: var(--xp-gold); padding: 8px 15px; border-radius: 20px; font-size: 0.7rem; margin-top: 15px; cursor: pointer; }
        .full-rank-list { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px dashed rgba(255,255,255,0.1); text-align: left; }
        .full-rank-list.show { display: block; }
        .rank-item-mini { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }

        /* --- XP & CARDS --- */
        .xp-badge { background: var(--xp-gold); color: #000; padding: 2px 8px; border-radius: 12px; font-weight: 900; font-size: 0.7rem; }
        .student-card { background: var(--card); border-radius: 10px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); position: relative; }
        .section-label { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; margin-top: 15px; color: var(--accent); }
        .status-badge { font-size: 0.6rem; color: white; padding: 3px 8px; border-radius: 4px; font-weight: bold; display: inline-block; margin-top: 10px; }

        /* --- WAITLIST CARD --- */
        .waitlist-card { border-left: 5px solid var(--waitlist-color); }
        .phone-link { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body data-theme="light">

<div id="splash-screen">
    <div class="logo-container">
        <img id="splash-logo" src="logo.png" alt="SSAP Logo">
        <video id="splash-video" muted playsinline preload="auto">
            <source src="animation.mp4" type="video/mp4">
        </video>
        <h1 class="logo-text">SSAP 2.0</h1>
        <div class="loading-bar-mini" id="loader"></div>
        <button id="start-btn" style="background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; display: none; text-transform: uppercase; letter-spacing: 2px;">Tap to start</button>
    </div>
</div>
    
<audio id="startup-sound" src="startup.mp3"></audio>

<nav class="nav-tabs">
    <button class="tab-btn active" onclick="showPage('daily')">📅 Daily</button>
    <button class="tab-btn" onclick="showPage('monthly')">📊 Monthly</button>
    <button class="tab-btn" onclick="showPage('waitlist')">⏳ Waitlist</button>
    <button class="tab-btn" onclick="showPage('bonus')">🦆 Bonus</button>
</nav>

<div class="container">
    <div class="header-box">
        <h2 style="margin:0; font-weight: 300;">SSAP <span style="color:var(--primary); font-weight: 800;">2.0</span></h2>
        <button class="theme-btn" onclick="toggleTheme()" id="themeText" style="background: var(--card); border: 1px solid var(--border); padding: 5px 15px; border-radius: 20px; cursor: pointer;">🌙 Dark</button>
    </div>

    <div id="page-daily" class="page active">
        <div class="leaderboard">
             <div id="alien-container"><span id="leaderboard-alien">👾</span></div>
             <div id="leaderboard-content">🏆 XP Leaderboard: Loading...</div>
             <button class="view-all-btn" onclick="toggleFullLeaderboard()" id="btnViewAll">View Full Rankings</button>
             <div id="full-leaderboard" class="full-rank-list"></div>
        </div>
        <div class="input-card">
            <form id="dailyForm">
                <div class="form-grid">
                    <div><label>Name</label><input type="text" id="d-name" required></div>
                    <div><label>STI</label><input type="text" id="d-sti"></div>
                    <div><label>Date</label><input type="date" id="d-date"></div>
                    <div class="full"><label>XP Change (+/-)</label><input type="text" inputmode="numeric" pattern="[0-9-]*" id="d-xp" value="0"></div>
                    <div class="full"><label>Notes</label><textarea id="d-notes" rows="2"></textarea></div>
                </div>
                <button type="submit" class="btn-add">Log Daily Activity</button>
            </form>
        </div>
        <div id="dailyList"></div>
    </div>

    <div id="page-monthly" class="page">
        <div class="input-card">
            <form id="studentForm">
                <div class="form-grid">
                    <div><label>Name</label><input type="text" id="name" required></div>
                    <div><label>STI</label><input type="text" id="sti"></div>
                    <div><label>Unit</label><input type="text" id="unit"></div>
                    <div class="full"><label>Course</label><input type="text" id="course"></div>
                    <div class="full"><label>Overall</label><textarea id="overall" rows="3"></textarea></div>
                    <div class="full">
                        <select id="statusOverride">
                            <option value="auto">🤖 Auto-Detect</option>
                            <option value="good">🟢 Excelling</option>
                            <option value="developing">🟡 Developing</option>
                            <option value="support">🔴 Support Needed</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-add">Save Monthly Record</button>
            </form>
        </div>
        <div id="studentList"></div>
    </div>

    <div id="page-waitlist" class="page">
        <div class="input-card">
            <h3 style="margin-top:0; color:var(--waitlist-color)">Học sinh Dự bị</h3>
            <form id="waitlistForm">
                <div class="form-grid">
                    <div class="full"><label>Họ và Tên</label><input type="text" id="w-name" required></div>
                    <div><label>SĐT Phụ huynh</label><input type="tel" id="w-phone"></div>
                    <div><label>Ngày liên hệ</label><input type="date" id="w-date"></div>
                    <div class="full"><label>Ghi chú</label><textarea id="w-notes" rows="3"></textarea></div>
                </div>
                <button type="submit" class="btn-add" style="background:var(--waitlist-color)">Lưu vào Waitlist</button>
            </form>
        </div>
        <div id="waitlistContent"></div>
    </div>

    <div id="page-bonus" class="page">
        <div class="duck-box">
            <div id="the-duck" style="font-size: 5rem; cursor: pointer; text-align: center; margin: 40px 0;" onclick="duckSecret()">🦆</div>
            <p style="font-size:0.6rem; opacity:0.5; text-align:center;">Quack!</p>
        </div>
    </div>
</div>

<script>
    let appData = { students: [], daily: [], bonus: [], waitlist: [] };

    // --- CORE ENGINE ---
    async function triggerSave() {
        localStorage.setItem('ssap_v2_data', JSON.stringify(appData));
    }

    function loadLocal() {
        const saved = localStorage.getItem('ssap_v2_data');
        if (saved) appData = JSON.parse(saved);
        if (!appData.waitlist) appData.waitlist = [];
        if (!appData.students) appData.students = [];
        if (!appData.daily) appData.daily = [];
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        event.currentTarget.classList.add('active');
        renderAll();
    }

    // --- FORMS ---
    document.getElementById('dailyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        appData.daily.unshift({
            name: document.getElementById('d-name').value.trim(),
            sti: document.getElementById('d-sti').value,
            date: document.getElementById('d-date').value || new Date().toISOString().split('T')[0],
            xp: parseInt(document.getElementById('d-xp').value) || 0,
            notes: document.getElementById('d-notes').value
        });
        await triggerSave();
        e.target.reset();
        document.getElementById('d-date').valueAsDate = new Date();
        document.getElementById('d-xp').value = "0";
        renderDaily();
    });

    document.getElementById('studentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        appData.students.unshift({
            name: document.getElementById('name').value,
            sti: document.getElementById('sti').value,
            unit: document.getElementById('unit').value,
            course: document.getElementById('course').value,
            overall: document.getElementById('overall').value,
            statusOverride: document.getElementById('statusOverride').value
        });
        await triggerSave();
        e.target.reset();
        renderMonthly();
    });

    document.getElementById('waitlistForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        appData.waitlist.unshift({
            name: document.getElementById('w-name').value,
            phone: document.getElementById('w-phone').value,
            date: document.getElementById('w-date').value || new Date().toISOString().split('T')[0],
            notes: document.getElementById('w-notes').value
        });
        await triggerSave();
        e.target.reset();
        document.getElementById('w-date').valueAsDate = new Date();
        renderWaitlist();
    });

    // --- RENDERING ---
    function renderDaily() {
        const list = document.getElementById('dailyList');
        const lbContent = document.getElementById('leaderboard-content');
        const fullLb = document.getElementById('full-leaderboard');
        if(!list) return;
        list.innerHTML = '';
        
        const totals = {};
        appData.daily.forEach(l => totals[l.name] = (totals[l.name] || 0) + l.xp);
        const sorted = Object.entries(totals).sort((a,b) => b[1]-a[1]);
        
        if(sorted.length > 0) {
            const top3 = sorted.slice(0,3);
            lbContent.innerHTML = `<div class="leaderboard-ranks">${top3.map((t, i) => `<div class="rank-card"><span>${i+1}. ${t[0]}</span><span class="xp-badge">${t[1]} XP</span></div>`).join('')}</div>`;
            fullLb.innerHTML = sorted.map((t, i) => `<div class="rank-item-mini"><span>${i+1}. ${t[0]}</span><b>${t[1]} XP</b></div>`).join('');
        }
        
        appData.daily.forEach((l, i) => {
            list.innerHTML += `<div class="student-card">
                <button onclick="deleteItem('daily', ${i})" style="float:right; border:none; background:none; cursor:pointer;">🗑️</button>
                <strong>${l.name}</strong> <span class="xp-badge">${l.xp >= 0 ? '+'+l.xp : l.xp} XP</span>
                <div style="font-size:0.8rem; opacity:0.5">${l.date}</div>
                <div style="margin-top:5px">${l.notes}</div>
            </div>`;
        });
    }

    function renderMonthly() {
        const container = document.getElementById('studentList');
        if(!container) return; container.innerHTML = '';
        appData.students.forEach((s, i) => {
            let color = s.statusOverride === 'good' ? "#2e7d32" : (s.statusOverride === 'developing' ? "#f1c40f" : "#e74c3c");
            container.innerHTML += `<div class="student-card">
                <button onclick="deleteItem('students', ${i})" style="float:right; border:none; background:none;">🗑️</button>
                <div class="section-label">${s.course} - Unit ${s.unit}</div>
                <h3 style="margin:5px 0">${s.name}</h3>
                <p style="white-space: pre-wrap;">${s.overall}</p>
                <span class="status-badge" style="background:${color}">${s.statusOverride.toUpperCase()}</span>
            </div>`;
        });
    }

    function renderWaitlist() {
        const container = document.getElementById('waitlistContent');
        if(!container) return; container.innerHTML = '';
        appData.waitlist.forEach((s, i) => {
            container.innerHTML += `<div class="student-card waitlist-card">
                <button onclick="deleteItem('waitlist', ${i})" style="float:right; border:none; background:none;">🗑️</button>
                <h3 style="margin:0">${s.name}</h3>
                <div style="margin: 10px 0;">📞 <a href="tel:${s.phone}" class="phone-link">${s.phone || 'N/A'}</a></div>
                <p>${s.notes}</p>
            </div>`;
        });
    }

    async function deleteItem(type, i) {
        if(confirm("Xóa mục này?")) { appData[type].splice(i, 1); await triggerSave(); renderAll(); }
    }

    function toggleTheme() {
        const b = document.body;
        const isLight = b.getAttribute('data-theme') === 'light';
        b.setAttribute('data-theme', isLight ? 'dark' : 'light');
        document.getElementById('themeText').innerText = isLight ? "☀️ Light" : "🌙 Dark";
    }

    function toggleFullLeaderboard() {
        const list = document.getElementById('full-leaderboard');
        list.classList.toggle('show');
        document.getElementById('btnViewAll').innerText = list.classList.contains('show') ? "Hide Rankings" : "View Full Rankings";
    }

    function duckSecret() { alert("Quack! Hệ thống ổn định."); }
    function renderAll() { renderDaily(); renderWaitlist(); renderMonthly(); }

    // --- LOGIC KHỞI ĐỘNG CHUẨN ---
    window.addEventListener('load', () => {
        loadLocal();
        if(document.getElementById('d-date')) document.getElementById('d-date').valueAsDate = new Date();
        if(document.getElementById('w-date')) document.getElementById('w-date').valueAsDate = new Date();
        
        const startBtn = document.getElementById('start-btn');
        const splash = document.getElementById('splash-screen');
        const startupSound = document.getElementById('startup-sound');
        const splashVideo = document.getElementById('splash-video');
        const splashLogo = document.getElementById('splash-logo');

        startBtn.style.display = 'block';

        startBtn.addEventListener('click', () => {
            // Ẩn nút và logo để nhường chỗ cho video
            startBtn.style.display = 'none';
            splashLogo.style.display = 'none';

            // 1. Chạy âm thanh
            startupSound.play().catch(e => console.log("Audio blocked"));

            // 2. Hiện và chạy Video
            if (splashVideo) {
                splashVideo.style.display = 'block';
                splashVideo.play().catch(e => console.log("Video blocked"));
            }

            // 3. Đợi video chạy một lúc (1.5s) rồi vào App
            setTimeout(() => {
                splash.classList.add('splash-hidden');
                document.body.classList.add('app-loaded');
                renderAll();
            }, 1500); 
        });
    });
</script>
</body>
</html>
