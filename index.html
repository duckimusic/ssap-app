<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSAP 2.0 | Progress Hub</title>
    <style>
        :root { --p: #2e7d32; --bg: #f4f7f6; --c: #ffffff; --t: #2c3e50; }
        [data-theme="dark"] { --bg: #121212; --c: #1e1e1e; --t: #e0e0e0; }
        body { font-family: sans-serif; background: var(--bg); color: var(--t); margin: 0; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; cursor: pointer; }
        #vid { display: none; width: 100%; max-width: 600px; }
        .hidden { opacity: 0; visibility: hidden; transition: 0.8s; }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; opacity: 0; transition: 0.5s; }
        .ready .container { opacity: 1; }
        .card { background: var(--c); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; background: var(--bg); color: var(--t); }
        button { cursor: pointer; font-weight: bold; border: none; border-radius: 5px; padding: 12px; }
    </style>
</head>
<body>

<div id="splash" onclick="go()">
    <div id="hint" style="color:white; text-align:center;">
        <div style="width:50px; height:50px; border:3px solid #2e7d32; border-radius:50%; margin: 0 auto 10px; animation: p 1s infinite;"></div>
        TAP TO START
    </div>
    <video id="vid" playsinline><source src="animation.mp4" type="video/mp4"></video>
</div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>SSAP 2.0 <span style="color:var(--p)">AI</span></h2>
        <button onclick="document.body.setAttribute('data-theme', document.body.getAttribute('data-theme')=='dark'?'light':'dark')">🌓 Theme</button>
    </div>

    <div class="card">
        <input type="text" id="name" placeholder="Student Name">
        <input type="text" id="sti" placeholder="STI">
        <textarea id="log" rows="3" placeholder="Paste notes here..."></textarea>
        <button onclick="ai()" style="background:#673ab7; color:white; width:100%;">✨ Process AI</button>
        <textarea id="ls" placeholder="Listening & Speaking" style="margin-top:10px;"></textarea>
        <textarea id="rw" placeholder="Reading & Writing"></textarea>
        <textarea id="ov" placeholder="Overall"></textarea>
        <button onclick="save()" style="background:var(--p); color:white; width:100%; margin-top:10px;">Save Record</button>
    </div>
    <div id="list"></div>
</div>

<script>
    const KEY = "AIzaSyDG5RYfo6gF6o19MkoL2DXjb_xV8LWc27U";
    let data = JSON.parse(localStorage.getItem('ssap_db')) || [];

    function go() {
        document.getElementById('hint').style.display='none';
        const v = document.getElementById('vid');
        v.style.display='block';
        v.play().catch(e => end());
        v.onended = end;
        setTimeout(end, 6000);
    }

    function end() {
        document.getElementById('splash').classList.add('hidden');
        document.body.classList.add('ready');
        setTimeout(() => document.getElementById('splash').remove(), 800);
    }

    async function ai() {
        const txt = document.getElementById('log').value;
        if(!txt) return;
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
            method: 'POST', body: JSON.stringify({contents:[{parts:[{text:`Convert to JSON {"ls":"","rw":"","ov":""} in Vietnamese: ${txt}`}]}]})
        });
        const d = await res.json();
        const j = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
        document.getElementById('ls').value = j.ls;
        document.getElementById('rw').value = j.rw;
        document.getElementById('ov').value = j.ov;
    }

    function save() {
        const s = { name: document.getElementById('name').value, sti: document.getElementById('sti').value, ls: document.getElementById('ls').value, rw: document.getElementById('rw').value, ov: document.getElementById('ov').value };
        data.unshift(s);
        localStorage.setItem('ssap_db', JSON.stringify(data));
        render();
    }

    function render() {
        document.getElementById('list').innerHTML = data.map((s,i) => `
            <div class="card">
                <strong>${s.name} (#${s.sti})</strong>
                <p><b>L&S:</b> ${s.ls}</p><p><b>R&W:</b> ${s.rw}</p><p><b>Overall:</b> ${s.ov}</p>
                <button onclick="data.splice(${i},1); localStorage.setItem('ssap_db', JSON.stringify(data)); render();" style="background:red; color:white; padding:5px;">Delete</button>
            </div>
        `).join('');
    }
    render();
</script>
<style> @keyframes p { 0% {transform:scale(0.8); opacity:1;} 100% {transform:scale(1.5); opacity:0;} } </style>
</body>
</html>
