<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SSAP 2.0 | Academic Hub (Fixed)</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#2e7d32">
    <link rel="apple-touch-icon" href="/logo.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2e7d32; --accent: #4caf50; --bg: #f4f7f6; --card: #ffffff;
            --text: #2c3e50; --border: #eeeeee; --shadow: rgba(0,0,0,0.08);
            --splash-bg: #000000; --xp-gold: #f1c40f;
        }
        [data-theme="dark"] {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --border: #333333; --shadow: rgba(0,0,0,0.4);
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; padding: 0; margin: 0; overflow-x: hidden; }
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--splash-bg); display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease-out, visibility 0.8s; color: white; text-align: center;
        }
        .logo-container { opacity: 0; transform: translateY(20px); animation: fadeInUp 1s forwards; display: flex; flex-direction: column; align-items: center; }
        #splash-logo { width: 160px; height: auto; border-radius: 20px; box-shadow: 0 0 20px rgba(255,255,255,0.1); background: white; padding: 10px; }
        #splash-video { width: 300px; max-width: 85%; height: auto; display: none; margin: 0 auto 15px auto; }
        .logo-text { font-size: 2.2rem; font-weight: 200; text-transform: uppercase; letter-spacing: 6px; margin: 0; }
        .loading-bar-mini { width: 100px; height: 2px; background: #333; margin: 20px auto; position: relative; overflow: hidden; }
        .loading-bar-mini::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: var(--accent); animation: loading 2s infinite; }
        @keyframes loading { to { left: 100%; } }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .splash-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .nav-tabs { display: flex; background: #000; padding: 10px 20px; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .tab-btn { background: transparent; border: none; color: #666; padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; transition: 0.2s; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid var(--accent); }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; opacity: 0; transition: opacity 1s ease-in; }
        .app-loaded .container { opacity: 1; }
        .page { display: none; }
        .page.active { display: block; }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .input-card { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px var(--shadow); border: 1px solid var(--border); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .full { grid-column: 1 / -1; }
        label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 0.7rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); box-sizing: border-box; font-family: inherit; }
        .btn-add { background: var(--primary); color: white; padding: 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.2s; }
        .btn-add:hover { opacity: 0.9; transform: scale(0.99); }
        .leaderboard { background: #1a1a1a; color: white; padding: 25px 15px; border-radius: 12px; margin-bottom: 20px; border-bottom: 4px solid var(--xp-gold); text-align: center; }
        #alien-container { display: flex; justify-content: center; margin-bottom: 10px; }
        #leaderboard-alien { font-size: 60px; animation: alienFloat 3s ease-in-out infinite; display: inline-block; }
        @keyframes alienFloat { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-12px) rotate(2deg); } }
        .leaderboard-ranks { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; text-align: left; }
        .rank-card { background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--xp-gold); }
        .view-all-btn { background: transparent; border: 1px solid var(--xp-gold); color: var(--xp-gold); padding: 8px 15px; border-radius: 20px; font-size: 0.7rem; margin-top: 15px; cursor: pointer; transition: 0.3s; }
        .view-all-btn:hover { background: var(--xp-gold); color: #000; }
        .full-rank-list { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px dashed rgba(255,255,255,0.1); text-align: left; }
        .full-rank-list.show { display: block; }
        .rank-item-mini { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .xp-badge { background: var(--xp-gold); color: #000; padding: 2px 8px; border-radius: 12px; font-weight: 900; font-size: 0.7rem; display: inline-block; }
        .student-card { background: var(--card); border-radius: 10px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); position: relative; transition: 0.2s; }
        .section-label { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; margin-top: 15px; color: var(--accent); letter-spacing: 0.5px; }
        .status-badge { font-size: 0.6rem; color: white; padding: 3px 8px; border-radius: 4px; font-weight: bold; display: inline-block; margin-top: 10px; }
        .duck-box { text-align: center; margin-bottom: 20px; }
        #the-duck { font-size: 3.5rem; cursor: pointer; display: inline-block; transition: 0.2s; user-select: none; }
        #the-duck:active { transform: scale(1.3); }
        .comment-card { background: #fffde7; border-left: 4px solid #fbc02d; padding: 15px; margin-bottom: 10px; border-radius: 4px; color: #333; word-break: break-word; }
        .search-input { width:100%; padding:10px; border-radius:40px; border:1px solid var(--border); margin-bottom:20px; background: var(--bg); color: var(--text); }
        .theme-btn { background: var(--card); border: 1px solid var(--border); padding: 5px 15px; border-radius: 20px; cursor: pointer; transition: 0.2s; }
        .action-icons { display: flex; gap: 12px; align-items: center; }
        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { position: absolute; top: 0; left: 0; width: 100%; margin: 0; padding: 20px; background: white; color: black; display: block; overflow: visible; box-sizing: border-box; z-index: 100000; }
            .print-area .student-card { break-inside: avoid; page-break-inside: avoid; border: 1px solid #ccc; margin-bottom: 20px !important; display: block; clear: both; overflow: visible; box-shadow: none; background: white; }
            @page { margin: 1.5cm; size: A4; }
            .print-area .no-print-date { display: none; }
        }
    </style>
</head>
<body data-theme="light">

<div id="splash-screen">
    <div class="logo-container">
        <img id="splash-logo" src="logo.png" alt="SSAP Logo" onerror="this.src='https://placehold.co/160x160?text=SSAP'">
        <video id="splash-video" muted playsinline preload="auto">
            <source src="animation.mp4" type="video/mp4">
        </video>
        <h1 class="logo-text">SSAP 2.0</h1>
        <div class="loading-bar-mini" id="loader"></div>
        <button id="start-btn" style="background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; display: none;">🚀 Launch</button>
    </div>
</div>

<audio id="startup-sound" src="startup.mp3"></audio>

<nav class="nav-tabs">
    <button class="tab-btn active" data-page="daily">📅 Daily XP</button>
    <button class="tab-btn" data-page="monthly">📊 Monthly SSAP</button>
    <button class="tab-btn" data-page="bonus">🦆 Bonus Wall</button>
</nav>

<div class="container">
    <div class="header-box">
        <h2 style="margin:0; font-weight: 300;">SSAP <span style="color:var(--primary); font-weight: 800;">2.0</span></h2>
        <button class="theme-btn" onclick="toggleTheme()" id="themeText">🌙 Dark</button>
    </div>

    <div id="page-daily" class="page active">
        <div class="leaderboard" id="xpLeaderboard">
             <div id="alien-container"><span id="leaderboard-alien">👾</span></div>
             <div id="leaderboard-content">🏆 XP Leaderboard: Loading...</div>

             <div id="full-leaderboard" class="full-rank-list"></div>
        </div>
        <div class="input-card">
            <form id="dailyForm">
                <div class="form-grid">
                    <div><label>Student Name</label><input type="text" id="d-name" required placeholder="Full name"></div>
                    <div><label>STI ID</label><input type="text" id="d-sti" placeholder="STI123"></div>
                    <div><label>Date</label><input type="date" id="d-date"></div>
                    <div class="full"><label>XP Change (+/-)</label><input type="text" inputmode="decimal" id="d-xp" value="0" placeholder="e.g., +10 or -5"></div>
                    <div class="full"><label>Notes / Behavior</label><textarea id="d-notes" rows="2" placeholder="Participation, homework, etc."></textarea></div>
                </div>
                <button type="submit" class="btn-add">📌 Log Daily Activity</button>
            </form>
        </div>
        <input type="text" id="searchDaily" class="search-input" placeholder="🔍 Filter daily entries by name / STI..." oninput="renderDaily()">
        <div id="dailyList"></div>
    </div>

    <div id="page-monthly" class="page">
        <div class="input-card">
            <form id="studentForm">
                <div class="form-grid">
                    <div><label>Full Name</label><input type="text" id="name" required></div>
                    <div><label>STI Code</label><input type="text" id="sti"></div>
                    <div><label>Unit / Class</label><input type="text" id="unit"></div>
                    <div class="full"><label>Course</label><input type="text" id="course"></div>
                    <div class="full"><label>Listening & Speaking</label><textarea id="ls" rows="2" placeholder="Observations / scores"></textarea></div>
                    <div class="full"><label>Reading & Writing</label><textarea id="rw" rows="2" placeholder="Progress notes"></textarea></div>
                    <div class="full"><label>Overall Assessment</label><textarea id="overall" rows="2" placeholder="Final comments"></textarea></div>
                    <div class="full">
                        <select id="statusOverride">
                            <option value="auto">🤖 Auto-Detect (based on overall text)</option>
                            <option value="good">🟢 Excelling</option>
                            <option value="developing">🟡 Developing</option>
                            <option value="support">🔴 Support Needed</option>
                        </select>
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="btn-add">💾 Save Monthly Record</button>
            </form>
        </div>
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search student by name / STI..." oninput="renderMonthly()">
        <div id="studentList"></div>

        <div class="input-card" id="pdfExportCard" style="margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                <label style="margin:0; font-size: 1rem;">📑 Generate Student Report (PDF)</label>
                <button id="refreshStudentListBtn" style="background: var(--accent); border: none; padding: 6px 14px; border-radius: 30px; cursor: pointer; font-weight: bold;">⟳ Refresh List</button>
            </div>
            <select id="studentSelectForPdf" multiple size="5" style="width:100%; margin-bottom: 15px; padding: 10px; border-radius: 12px;"></select>
            <button id="exportPdfBtn" class="btn-add" style="background: #ff9800; margin-top: 0;">📄 Export Selected to PDF (Clean Print)</button>
            <p style="font-size: 0.7rem; opacity: 0.7; margin-top: 12px;">💡 Tip: Hold Ctrl (Windows) / Cmd (Mac) to select multiple students → click export → choose "Save as PDF". No date stamp, zero overlap.</p>
        </div>
    </div>

    <div id="page-bonus" class="page">
        <div class="duck-box">
            <div id="the-duck" onclick="duckSecret()">🦆</div>
            <p style="font-size:0.6rem; opacity:0.6">Quack 8 times for admin mode 🔓</p>
        </div>

            <form id="bonusForm">

            </form>
        </div>
        <div id="bonusList"></div>
    </div>
</div>

    async function syncCloud(method, data = null) {
        try {
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (data) options.body = JSON.stringify(data);
            const res = await fetch('/api/data', options);
            return method === 'GET' ? await res.json() : null;
        } catch(e) { return null; }
    }

    async function initApp() {
        if (!navigator.onLine) { loadLocalBackup(); renderAll(); return; }
        try {
            const cloudData = await syncCloud('GET');
            if (cloudData && cloudData.students) appData = cloudData;
            else loadLocalBackup();
            renderAll();
        } catch (e) { loadLocalBackup(); renderAll(); }
    }

    function loadLocalBackup() {
        appData.students = JSON.parse(localStorage.getItem('stu_final_v2')) || [];
        appData.daily = JSON.parse(localStorage.getItem('stu_daily')) || [];
        appData.bonus = JSON.parse(localStorage.getItem('stu_bonus')) || [];
    }

    async function triggerSave() {
        if (navigator.onLine) await syncCloud('POST', appData);
        localStorage.setItem('stu_final_v2', JSON.stringify(appData.students));
        localStorage.setItem('stu_daily', JSON.stringify(appData.daily));
        localStorage.setItem('stu_bonus', JSON.stringify(appData.bonus));
    }

        document.getElementById('splash-screen').classList.add('splash-hidden');
        document.body.classList.add('app-loaded');

        const logo = document.getElementById('splash-logo');
        const audio = document.getElementById('startup-sound');
        document.getElementById('loader').style.display = 'none';
        startBtn.style.display = 'inline-block';
        startBtn.onclick = () => {
            audio.play().catch(e=>{});
            logo.style.display = 'none';
            document.querySelector('.logo-text').style.display = 'none';
            video.style.display = 'block';
            video.play().catch(e => hideSplash());
            startBtn.style.display = 'none';
            video.onended = hideSplash;
            setTimeout(hideSplash, 4500);
            initApp();
        };
    });
