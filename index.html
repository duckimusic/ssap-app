<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSAP 2.0 | Educator Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2e7d32;
            --accent: #4caf50;
            --bg: #f4f7f6;
            --card: #ffffff;
            --text: #2c3e50;
            --border: #eeeeee;
            --shadow: rgba(0,0,0,0.08);
            --splash-bg: #000000;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --border: #333333;
            --shadow: rgba(0,0,0,0.4);
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; padding: 0; margin: 0; overflow-x: hidden; }
        
        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--splash-bg);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s;
            color: white; text-align: center;
        }

        #splash-video { width: 300px; max-width: 85%; height: auto; display: block; margin: 0 auto 15px auto; }
        .logo-container { opacity: 0; transform: translateY(20px); animation: fadeInUp 1s forwards; }
        .logo-text { font-size: 2.2rem; font-weight: 200; text-transform: uppercase; letter-spacing: 6px; margin: 0; }
        .loading-bar-mini { width: 100px; height: 2px; background: #333; margin: 20px auto; position: relative; overflow: hidden; }
        .loading-bar-mini::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: var(--accent); animation: loading 2s infinite; }
        @keyframes loading { to { left: 100%; } }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .splash-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* --- MAIN INTERFACE --- */
        .container { max-width: 900px; margin: 0 auto; padding: 20px; opacity: 0; transition: opacity 1s ease-in; }
        .app-loaded .container { opacity: 1; }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .search-input { width: 100%; padding: 12px; border-radius: 25px; border: 1px solid var(--border); background: var(--card); color: var(--text); margin-bottom: 20px; box-shadow: 0 2px 5px var(--shadow); box-sizing: border-box; }
        .input-card { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px var(--shadow); border: 1px solid var(--border); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .full { grid-column: 1 / -1; }
        label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 0.75rem; color: var(--primary); text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 0.95rem; }
        .btn-add { background: var(--primary); color: white; padding: 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; font-size: 1rem; }
        
        /* --- STUDENT CARD --- */
        .student-card { background: var(--card); border-radius: 10px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 4px 15px var(--shadow); position: relative; }
        .card-header { margin-bottom: 15px; }
        .card-header h3 { margin: 0; font-size: 1.4rem; }
        .card-header span { opacity: 0.6; font-size: 0.9rem; }
        .card-meta { font-size: 0.85rem; color: #888; margin-top: 5px; font-weight: 500; }
        .section-label { font-size: 0.75rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; margin-top: 20px; margin-bottom: 5px; }
        .label-ls { color: #43a047; }
        .label-rw { color: #43a047; }
        .label-overall { color: #e67e22; }
        .text-content { font-size: 0.95rem; line-height: 1.6; margin: 0; white-space: pre-wrap; }
        .status-badge { font-size: 0.65rem; color: white; padding: 3px 8px; border-radius: 4px; font-weight: bold; display: inline-block; margin-top: 10px; text-transform: uppercase; }
        
        .action-btns { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; }
        .action-btn { cursor: pointer; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 5px 8px; transition: 0.2s; font-size: 0.9rem; }
        .action-btn:hover { background: #eee; }

        .no-export { display: none !important; }
    </style>
</head>
<body data-theme="light">

<div id="splash-screen">
    <div class="logo-container">
        <video id="splash-video" muted playsinline preload="auto">
            <source src="animation.mp4" type="video/mp4">
        </video>
        <h1 class="logo-text">SSAP 2.0</h1>
        <div class="loading-bar-mini" id="loader"></div>
        <button id="start-btn" style="background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; display: none;">Tap to start</button>
    </div>
</div>
    
<audio id="startup-sound" src="startup.mp3"></audio>

<div class="container">
    <div class="header-box">
        <h2 style="margin:0; font-weight: 300;">SSAP <span style="color:var(--primary); font-weight: 800;">2.0</span></h2>
        <button class="theme-btn" onclick="toggleTheme()" id="themeText">🌙 Dark Mode</button>
    </div>

    <input type="text" id="searchInput" class="search-input" placeholder="Search name or STI..." oninput="render()">

    <div class="input-card" id="form-container">
        <form id="studentForm">
            <div class="form-grid">
                <div><label>Name</label><input type="text" id="name" required></div>
                <div><label>STI</label><input type="text" id="sti"></div>
                <div><label>Unit</label><input type="text" id="unit"></div>
                <div class="full"><label>Course</label><input type="text" id="course"></div>
                
                <div class="full"><label>Listening & Speaking</label><textarea id="ls" rows="3" placeholder="Enter comments for L&S..."></textarea></div>
                <div class="full"><label>Reading & Writing</label><textarea id="rw" rows="3" placeholder="Enter comments for R&W..."></textarea></div>
                <div class="full"><label>Overall Summary</label><textarea id="overall" rows="3" placeholder="Enter general feedback..."></textarea></div>

                <div class="full">
                    <label>Status Badge</label>
                    <select id="statusOverride">
                        <option value="auto">🤖 Auto-Detect (based on overall)</option>
                        <option value="good">🟢 Excelling</option>
                        <option value="developing">🟡 Developing</option>
                        <option value="support">🔴 Support Needed</option>
                    </select>
                </div>
            </div>
            <button type="submit" id="submitBtn" class="btn-add">Save Student Record</button>
        </form>
    </div>

    <div id="studentList"></div>
</div>

<script>
    let students = JSON.parse(localStorage.getItem('stu_final_v2')) || [];
    let editIdx = null;

    function hideSplash() {
        document.getElementById('splash-screen').classList.add('splash-hidden');
        document.body.classList.add('app-loaded');
    }

    window.addEventListener('load', () => {
        const startBtn = document.getElementById('start-btn');
        const video = document.getElementById('splash-video');
        const audio = document.getElementById('startup-sound');
        document.getElementById('loader').style.display = 'none';
        startBtn.style.display = 'inline-block';
        startBtn.addEventListener('click', () => {
            audio.play().catch(e => console.log("Audio play blocked")); 
            video.play().catch(e => console.log("Video play blocked")); 
            startBtn.style.display = 'none';
            video.onended = hideSplash; 
            setTimeout(hideSplash, 4000); 
        });
    });

    function getStatus(txt, override) {
        if (override !== "auto") {
            const map = { good: ["Excelling", "#2e7d32"], developing: ["Developing", "#ffa000"], support: ["Support Needed", "#d32f2f"] };
            return { label: map[override][0], color: map[override][1] };
        }
        const t = (txt || "").toLowerCase();
        if (["tốt", "vượt trội", "tiến bộ", "good", "great", "excellent"].some(w => t.includes(w))) return { label: "Excelling", color: "#2e7d32" };
        if (["yếu", "chậm", "cần hỗ trợ", "weak", "support"].some(w => t.includes(w))) return { label: "Support Needed", color: "#d32f2f" };
        return { label: "Developing", color: "#ffa000" };
    }

    function downloadPDF(index) {
        const card = document.querySelectorAll('.student-card')[index];
        const studentName = students[index].name;
        const btns = card.querySelector('.action-btns');
        btns.classList.add('no-export');

        const opt = {
            margin: 10,
            filename: `Report_${studentName}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(card).save().then(() => {
            btns.classList.remove('no-export');
        });
    }

    function editStudent(index) {
        editIdx = index;
        const s = students[index];
        document.getElementById('name').value = s.name;
        document.getElementById('sti').value = s.sti;
        document.getElementById('unit').value = s.unit;
        document.getElementById('course').value = s.course;
        document.getElementById('ls').value = s.ls;
        document.getElementById('rw').value = s.rw;
        document.getElementById('overall').value = s.overall;
        document.getElementById('statusOverride').value = s.statusOverride || "auto";
        document.getElementById('submitBtn').innerText = "Update Student Record";
        document.getElementById('submitBtn').style.background = "#673ab7";
        document.getElementById('form-container').scrollIntoView({ behavior: 'smooth' });
    }

    function deleteStudent(index) {
        if (confirm("Delete this record permanently?")) {
            students.splice(index, 1);
            localStorage.setItem('stu_final_v2', JSON.stringify(students));
            render();
        }
    }

    function render() {
        const list = document.getElementById('studentList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = '';
        students.forEach((s, i) => {
            if (!s.name.toLowerCase().includes(search) && !s.sti.toLowerCase().includes(search)) return;
            const status = getStatus(s.overall, s.statusOverride || "auto");
            list.innerHTML += `
                <div class="student-card">
                    <div class="action-btns">
                        <button class="action-btn" onclick="downloadPDF(${i})" title="Download PDF">📥</button>
                        <button class="action-btn" onclick="editStudent(${i})" title="Edit">✏️</button>
                        <button class="action-btn" onclick="deleteStudent(${i})" title="Delete">🗑️</button>
                    </div>
                    <div class="card-header">
                        <h3>${s.name} <span>#${s.sti || 'N/A'}</span></h3>
                        <div class="card-meta">${s.course || 'No Course'} • Unit ${s.unit || 'N/A'}</div>
                    </div>
                    
                    <div class="section-label label-ls">LISTENING & SPEAKING</div>
                    <div class="text-content">${s.ls || 'No comments provided.'}</div>

                    <div class="section-label label-rw">READING & WRITING</div>
                    <div class="text-content">${s.rw || 'No comments provided.'}</div>

                    <div class="section-label label-overall">OVERALL</div>
                    <div class="text-content">${s.overall || 'No comments provided.'}</div>

                    <div class="status-badge" style="background:${status.color}">${status.label}</div>
                </div>`;
        });
    }

    document.getElementById('studentForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const data = {
            name: document.getElementById('name').value, 
            sti: document.getElementById('sti').value,
            unit: document.getElementById('unit').value, 
            course: document.getElementById('course').value,
            ls: document.getElementById('ls').value, 
            rw: document.getElementById('rw').value,
            overall: document.getElementById('overall').value, 
            statusOverride: document.getElementById('statusOverride').value
        };

        if (editIdx !== null) {
            students[editIdx] = data;
            editIdx = null;
            document.getElementById('submitBtn').innerText = "Save Student Record";
            document.getElementById('submitBtn').style.background = "var(--primary)";
        } else {
            students.unshift(data);
        }

        localStorage.setItem('stu_final_v2', JSON.stringify(students));
        e.target.reset(); render();
    });

    function toggleTheme() {
        const b = document.body;
        const isLight = b.getAttribute('data-theme') === 'light';
        b.setAttribute('data-theme', isLight ? 'dark' : 'light');
        document.getElementById('themeText').innerText = isLight ? "☀️ Light" : "🌙 Dark";
    }

    render();
</script>
</body>
</html>
