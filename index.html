<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSAP 2.0 | Home</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2e7d32; --accent: #4caf50; --bg: #f4f7f6; --card: #ffffff;
            --text: #2c3e50; --border: #eeeeee; --shadow: rgba(0,0,0,0.08);
            --splash-bg: #000000; --xp-gold: #f1c40f; --waitlist-color: #607d8b;
        }
        [data-theme="dark"] {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --border: #333333; --shadow: rgba(0,0,0,0.4);
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; padding: 0; margin: 0; overflow-x: hidden; }
        
        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--splash-bg); display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.2s; color: white; text-align: center;
        }
        .logo-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        #splash-logo { width: 140px; height: auto; border-radius: 20px; margin-bottom: 20px; transition: 0.5s; }
        #splash-video { width: 100%; max-width: 500px; height: auto; display: none; }
        .logo-text { font-size: 2.2rem; font-weight: 200; text-transform: uppercase; letter-spacing: 6px; margin: 10px 0; }
        .splash-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* --- TABS & CONTAINER --- */
        .nav-tabs { display: flex; background: #000; padding: 10px; gap: 5px; position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tab-btn { background: transparent; border: none; color: #666; padding: 12px 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 1px; flex-shrink: 0; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid var(--accent); }
        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; opacity: 0; transition: opacity 1.5s ease-in; }
        .app-loaded .container { opacity: 1; }
        .page { display: none; }
        .page.active { display: block; }

        /* --- CARDS & LISTS --- */
        .student-card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 4px 10px var(--shadow); position: relative; }
        .xp-badge { background: var(--xp-gold); color: #000; padding: 4px 10px; border-radius: 20px; font-weight: 900; font-size: 0.75rem; }
        .status-badge { font-size: 0.65rem; color: white; padding: 4px 10px; border-radius: 4px; font-weight: bold; display: inline-block; margin-top: 10px; text-transform: uppercase; }
        .leaderboard { background: #1a1a1a; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-bottom: 4px solid var(--xp-gold); }
        .input-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
        .full { grid-column: 1 / -1; }
        label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 0.7rem; color: var(--primary); text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); box-sizing: border-box; }
        .btn-add { background: var(--primary); color: white; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
    </style>
</head>
<body data-theme="light">

<div id="splash-screen">
    <div class="logo-container">
        <img id="splash-logo" src="logo.png" alt="SSAP Logo">
        <video id="splash-video" playsinline preload="auto">
            <source src="animation.mp4" type="video/mp4">
        </video>
        <h1 id="splash-text" class="logo-text">SSAP 2.0</h1>
        <button id="start-btn" style="background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; display: none; letter-spacing: 2px;">TAP TO START</button>
    </div>
</div>
    
<audio id="startup-sound" src="startup.mp3"></audio>

<nav class="nav-tabs">
    <button class="tab-btn active" onclick="showPage('daily')">📅 Daily</button>
    <button class="tab-btn" onclick="showPage('monthly')">📊 Monthly</button>
    <button class="tab-btn" onclick="showPage('waitlist')">⏳ Waitlist</button>
</nav>

<div class="container">
    <div class="header-box" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin:0;">SSAP <span style="color:var(--primary); font-weight: 800;">2.0</span></h2>
        <button onclick="toggleTheme()" id="themeText" style="background: var(--card); border: 1px solid var(--border); padding: 8px 15px; border-radius: 20px; cursor: pointer;">🌙 Dark</button>
    </div>

    <div id="page-daily" class="page active">
        <div class="leaderboard">
             <div id="leaderboard-content" style="font-weight: bold;">🏆 XP Leaderboard: Loading...</div>
        </div>
        <div class="input-card">
            <form id="dailyForm">
                <div class="form-grid">
                    <div><label>Name</label><input type="text" id="d-name" required></div>
                    <div><label>Date</label><input type="date" id="d-date"></div>
                    <div class="full"><label>XP Change</label><input type="text" inputmode="numeric" pattern="[0-9-]*" id="d-xp" value="0"></div>
                    <div class="full"><label>Notes</label><textarea id="d-notes" rows="2"></textarea></div>
                </div>
                <button type="submit" class="btn-add">Add Activity</button>
            </form>
        </div>
        <div id="dailyList"></div>
    </div>

    <div id="page-monthly" class="page">
        <div class="input-card">
            <form id="studentForm">
                <div class="form-grid">
                    <div><label>Name</label><input type="text" id="name" required></div>
                    <div><label>Unit</label><input type="text" id="unit"></div>
                    <div class="full"><label>Course</label><input type="text" id="course"></div>
                    <div class="full"><label>Overall Comment</label><textarea id="overall" rows="3"></textarea></div>
                    <div class="full">
                        <select id="statusOverride">
                            <option value="good">🟢 Excelling</option>
                            <option value="developing">🟡 Developing</option>
                            <option value="support">🔴 Support Needed</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-add">Save Report</button>
            </form>
        </div>
        <div id="studentList"></div>
    </div>

    <div id="page-waitlist" class="page">
        <div id="waitlistContent"></div>
    </div>
</div>

<script>
    let appData = { students: [], daily: [], waitlist: [] };

    async function triggerSave() {
        localStorage.setItem('ssap_v2_data', JSON.stringify(appData));
    }

    function loadLocal() {
        const saved = localStorage.getItem('ssap_v2_data');
        if (saved) {
            appData = JSON.parse(saved);
            // Bảo vệ mảng nếu data cũ bị lỗi
            if (!appData.daily) appData.daily = [];
            if (!appData.students) appData.students = [];
            if (!appData.waitlist) appData.waitlist = [];
        }
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        event.currentTarget.classList.add('active');
        renderAll();
    }

    // --- RENDERING LOGIC (KHÔNG LÀM MẤT DATA NỮA) ---
    function renderDaily() {
        const list = document.getElementById('dailyList');
        if(!list) return;
        list.innerHTML = '';
        
        // Cập nhật Leaderboard nhanh
        const totals = {};
        appData.daily.forEach(l => totals[l.name] = (totals[l.name] || 0) + l.xp);
        const sorted = Object.entries(totals).sort((a,b) => b[1]-a[1]);
        const lb = document.getElementById('leaderboard-content');
        if(sorted.length > 0) {
            lb.innerHTML = `🏆 Top 1: ${sorted[0][0]} (${sorted[0][1]} XP)`;
        }

        appData.daily.forEach((l, i) => {
            list.innerHTML += `<div class="student-card">
                <button onclick="deleteItem('daily', ${i})" style="float:right; border:none; background:none; cursor:pointer;">🗑️</button>
                <strong>${l.name}</strong> <span class="xp-badge">${l.xp >= 0 ? '+'+l.xp : l.xp} XP</span>
                <div style="font-size:0.8rem; opacity:0.5">${l.date}</div>
                <div style="margin-top:5px">${l.notes}</div>
            </div>`;
        });
    }

    function renderMonthly() {
        const container = document.getElementById('studentList');
        if(!container) return;
        container.innerHTML = '';
        appData.students.forEach((s, i) => {
            let color = s.statusOverride === 'good' ? "#2e7d32" : (s.statusOverride === 'developing' ? "#f1c40f" : "#e74c3c");
            container.innerHTML += `<div class="student-card">
                <button onclick="deleteItem('students', ${i})" style="float:right; border:none; background:none; cursor:pointer;">🗑️</button>
                <div style="color:var(--accent); font-weight:bold; font-size:0.7rem;">${s.course}</div>
                <h3 style="margin:5px 0;">${s.name}</h3>
                <p style="white-space:pre-wrap;">${s.overall}</p>
                <span class="status-badge" style="background:${color}">${s.statusOverride}</span>
            </div>`;
        });
    }

    function renderAll() { renderDaily(); renderMonthly(); }

    async function deleteItem(type, i) {
        if(confirm("Xóa mục này?")) { appData[type].splice(i, 1); await triggerSave(); renderAll(); }
    }

    // --- STARTUP & SPLASH ENGINE (FIXED) ---
    window.addEventListener('load', () => {
        loadLocal();
        document.getElementById('d-date').valueAsDate = new Date();
        
        const startBtn = document.getElementById('start-btn');
        const splash = document.getElementById('splash-screen');
        const video = document.getElementById('splash-video');
        const logo = document.getElementById('splash-logo');
        const sText = document.getElementById('splash-text');
        const sound = document.getElementById('startup-sound');

        startBtn.style.display = 'block';

        startBtn.onclick = () => {
            // 1. Dọn dẹp UI để chạy Video
            startBtn.style.display = 'none';
            logo.style.display = 'none';
            sText.style.display = 'none';
            
            // 2. Play Sound & Video
            sound.play().catch(e => {});
            video.style.display = 'block';
            video.play();

            // 3. QUAN TRỌNG: Đợi video kết thúc mới Fade Transition
            video.onended = () => {
                splash.classList.add('splash-hidden'); // Fade mượt 1.2s bằng CSS
                document.body.classList.add('app-loaded');
                renderAll(); // Load data ngay khi vào
            };
        };
    });

    // Form Event Listeners
    document.getElementById('dailyForm').onsubmit = async (e) => {
        e.preventDefault();
        appData.daily.unshift({
            name: document.getElementById('d-name').value,
            date: document.getElementById('d-date').value,
            xp: parseInt(document.getElementById('d-xp').value) || 0,
            notes: document.getElementById('d-notes').value
        });
        await triggerSave(); e.target.reset(); renderDaily();
    };

    document.getElementById('studentForm').onsubmit = async (e) => {
        e.preventDefault();
        appData.students.unshift({
            name: document.getElementById('name').value,
            course: document.getElementById('course').value,
            unit: document.getElementById('unit').value,
            overall: document.getElementById('overall').value,
            statusOverride: document.getElementById('statusOverride').value
        });
        await triggerSave(); e.target.reset(); renderMonthly();
    };

    function toggleTheme() {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    }
</script>
</body>
</html>
