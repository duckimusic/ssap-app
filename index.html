<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSAP 2.0 | Command Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2e7d32; --accent: #4caf50; --bg: #f4f7f6; --card: #ffffff;
            --text: #2c3e50; --border: #eeeeee; --shadow: rgba(0,0,0,0.08);
            --xp-color: #f1c40f; --duck-yellow: #ffeb3b;
        }
        [data-theme="dark"] {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --border: #333333; --shadow: rgba(0,0,0,0.4);
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* --- NAVIGATION TABS --- */
        .nav-tabs { display: flex; background: #000; padding: 10px 20px; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .tab-btn { background: transparent; border: none; color: #888; padding: 10px 20px; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; transition: 0.3s; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid var(--accent); }

        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        .page { display: none; }
        .page.active { display: block; }

        .input-card { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px var(--shadow); border: 1px solid var(--border); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .full { grid-column: 1 / -1; }
        label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 0.7rem; color: var(--primary); text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); box-sizing: border-box; }
        
        /* --- XP SYSTEM --- */
        .xp-controls { display: flex; gap: 10px; margin-top: 10px; }
        .btn-xp { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .gain { background: var(--xp-color); color: #000; }
        .loss { background: #e74c3c; color: #fff; }
        
        /* --- DUCK BONUS PAGE --- */
        .duck-container { text-align: center; margin-bottom: 20px; }
        #the-duck { font-size: 3rem; cursor: pointer; user-select: none; display: inline-block; transition: 0.2s; }
        #the-duck:active { transform: scale(1.3) rotate(15deg); }
        .comment-card { background: #fff8e1; border-left: 5px solid #ffd54f; padding: 15px; margin-bottom: 10px; border-radius: 4px; color: #333; }
        [data-theme="dark"] .comment-card { background: #2d2d2d; color: #eee; border-color: #f1c40f; }

        /* --- GLOBAL UI --- */
        .btn-save { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-bar input { flex: 1; min-width: 150px; }
        .item-card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        .action-btns { position: absolute; top: 15px; right: 15px; }
        .delete-btn { color: #e74c3c; cursor: pointer; font-size: 0.8rem; background: none; border: none; }
    </style>
</head>
<body>

<nav class="nav-tabs">
    <button class="tab-btn active" onclick="showPage('daily')">📅 Daily Assessment</button>
    <button class="tab-btn" onclick="showPage('monthly')">📊 Monthly SSAP</button>
    <button class="tab-btn" onclick="showPage('bonus')">🦆 Bonus Q&A</button>
</nav>

<div class="container">
    
    <div id="page-daily" class="page active">
        <div class="input-card">
            <h3>Daily Tracker</h3>
            <form id="dailyForm">
                <div class="form-grid">
                    <div><label>Name</label><input type="text" id="d-name" required></div>
                    <div><label>STI</label><input type="text" id="d-sti"></div>
                    <div><label>Date</label><input type="date" id="d-date"></div>
                    <div class="full"><label>Behavior & Notes</label><textarea id="d-notes" rows="2"></textarea></div>
                    <div class="full">
                        <label>XP Points Change</label>
                        <input type="number" id="d-xp" value="0">
                        <div class="xp-controls">
                            <button type="button" class="btn-xp gain" onclick="adjustXP(10)">+10 XP (Homework)</button>
                            <button type="button" class="btn-xp loss" onclick="adjustXP(-10)">-10 XP (Behavior)</button>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-save">Log Daily Activity</button>
            </form>
        </div>
        
        <div class="filter-bar">
            <input type="text" id="f-name" placeholder="Filter by Name..." oninput="renderDaily()">
            <input type="text" id="f-sti" placeholder="Filter STI..." oninput="renderDaily()">
            <input type="date" id="f-date" oninput="renderDaily()">
        </div>
        <div id="dailyList"></div>
    </div>

    <div id="page-monthly" class="page">
        <div class="input-card">
            <h3>Monthly SSAP Report</h3>
            <form id="monthlyForm">
                <div class="form-grid">
                    <div><label>Name</label><input type="text" id="m-name" required></div>
                    <div><label>STI</label><input type="text" id="m-sti"></div>
                    <div><label>Unit</label><input type="text" id="m-unit"></div>
                    <div class="full"><label>Course</label><input type="text" id="m-course"></div>
                    <div class="full"><label>Listening & Speaking</label><textarea id="m-ls" rows="3"></textarea></div>
                    <div class="full"><label>Reading & Writing</label><textarea id="m-rw" rows="3"></textarea></div>
                    <div class="full"><label>Overall Summary</label><textarea id="m-overall" rows="3"></textarea></div>
                </div>
                <button type="submit" class="btn-save">Generate Monthly Report</button>
            </form>
        </div>
        <div id="monthlyList"></div>
    </div>

    <div id="page-bonus" class="page">
        <div class="duck-container">
            <div id="the-duck" onclick="duckClick()">🦆</div>
            <p style="font-size: 0.7rem; opacity: 0.5;">The all-seeing duck watches your English progress...</p>
        </div>
        <div class="input-card">
            <form id="bonusForm">
                <label>Student Name</label>
                <input type="text" id="b-name" required style="margin-bottom: 10px;">
                <label>English Comment / Question</label>
                <textarea id="b-msg" rows="3" placeholder="Write something in English..."></textarea>
                <button type="submit" class="btn-save" style="background:#f1c40f; color:#000;">Submit to Wall</button>
            </form>
        </div>
        <div id="bonusList"></div>
    </div>

</div>

<script>
    let dailyLogs = JSON.parse(localStorage.getItem('ssap_daily')) || [];
    let monthlyLogs = JSON.parse(localStorage.getItem('ssap_monthly')) || [];
    let bonusLogs = JSON.parse(localStorage.getItem('ssap_bonus')) || [];
    
    let duckCount = 0;
    let isAdmin = false;

    // --- TAB SYSTEM ---
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        event.currentTarget.classList.add('active');
        renderAll();
    }

    // --- XP & DAILY LOGIC ---
    function adjustXP(val) { document.getElementById('d-xp').value = parseInt(document.getElementById('d-xp').value) + val; }

    document.getElementById('dailyForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const entry = {
            name: document.getElementById('d-name').value,
            sti: document.getElementById('d-sti').value,
            date: document.getElementById('d-date').value || new Date().toISOString().split('T')[0],
            notes: document.getElementById('d-notes').value,
            xp: document.getElementById('d-xp').value
        };
        dailyLogs.unshift(entry);
        localStorage.setItem('ssap_daily', JSON.stringify(dailyLogs));
        e.target.reset(); renderDaily();
    });

    // --- MONTHLY LOGIC ---
    document.getElementById('monthlyForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const entry = {
            name: document.getElementById('m-name').value, sti: document.getElementById('m-sti').value,
            unit: document.getElementById('m-unit').value, course: document.getElementById('m-course').value,
            ls: document.getElementById('m-ls').value, rw: document.getElementById('m-rw').value,
            overall: document.getElementById('m-overall').value, date: new Date().toLocaleDateString()
        };
        monthlyLogs.unshift(entry);
        localStorage.setItem('ssap_monthly', JSON.stringify(monthlyLogs));
        e.target.reset(); renderMonthly();
    });

    // --- BONUS LOGIC & DUCK SECRET ---
    function duckClick() {
        duckCount++;
        if (duckCount === 8) {
            isAdmin = !isAdmin;
            alert(isAdmin ? "ADMIN MODE: ACTIVATED. You can now delete comments." : "ADMIN MODE: DEACTIVATED.");
            duckCount = 0;
            renderBonus();
        }
    }

    document.getElementById('bonusForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const entry = {
            name: document.getElementById('b-name').value,
            msg: document.getElementById('b-msg').value,
            time: new Date().toLocaleString()
        };
        bonusLogs.unshift(entry);
        localStorage.setItem('ssap_bonus', JSON.stringify(bonusLogs));
        e.target.reset(); renderBonus();
    });

    // --- RENDER FUNCTIONS ---
    function renderDaily() {
        const list = document.getElementById('dailyList');
        const fName = document.getElementById('f-name').value.toLowerCase();
        const fSti = document.getElementById('f-sti').value;
        const fDate = document.getElementById('f-date').value;

        list.innerHTML = '';
        dailyLogs.forEach((log, i) => {
            if ((fName && !log.name.toLowerCase().includes(fName)) || 
                (fSti && log.sti !== fSti) || 
                (fDate && log.date !== fDate)) return;

            list.innerHTML += `
                <div class="item-card">
                    <div class="action-btns"><button class="delete-btn" onclick="deleteLog('daily', ${i})">🗑️</button></div>
                    <strong>${log.name}</strong> <span style="font-size:0.7rem">(${log.date})</span>
                    <div style="margin-top:5px; font-size:0.9rem;">${log.notes}</div>
                    <div style="color:var(--xp-color); font-weight:bold; margin-top:5px;">XP: ${log.xp > 0 ? '+'+log.xp : log.xp}</div>
                </div>`;
        });
    }

    function renderMonthly() {
        const list = document.getElementById('monthlyList');
        list.innerHTML = '';
        monthlyLogs.forEach((s, i) => {
            list.innerHTML += `
                <div class="item-card">
                    <div class="action-btns">
                        <button class="delete-btn" onclick="deleteLog('monthly', ${i})">🗑️</button>
                    </div>
                    <h3>${s.name} <span style="font-weight:100">#${s.sti}</span></h3>
                    <p style="font-size:0.8rem; opacity:0.7">${s.course} • Unit ${s.unit}</p>
                    <div style="font-size:0.9rem; white-space:pre-wrap;">${s.overall}</div>
                </div>`;
        });
    }

    function renderBonus() {
        const list = document.getElementById('bonusList');
        list.innerHTML = '';
        bonusLogs.forEach((b, i) => {
            list.innerHTML += `
                <div class="comment-card">
                    ${isAdmin ? `<button class="delete-btn" style="float:right" onclick="deleteLog('bonus', ${i})">❌ Delete</button>` : ''}
                    <div style="font-size:0.7rem; font-weight:bold; color:var(--primary)">${b.name} (${b.time})</div>
                    <div style="margin-top:5px italic">"${b.msg}"</div>
                </div>`;
        });
    }

    function deleteLog(type, i) {
        if (!confirm("Are you sure?")) return;
        if (type === 'daily') dailyLogs.splice(i, 1);
        if (type === 'monthly') monthlyLogs.splice(i, 1);
        if (type === 'bonus') bonusLogs.splice(i, 1);
        localStorage.setItem('ssap_'+type, JSON.stringify(eval(type+'Logs')));
        renderAll();
    }

    function renderAll() { renderDaily(); renderMonthly(); renderBonus(); }
    
    // Set default date to today
    document.getElementById('d-date').valueAsDate = new Date();
    renderAll();
</script>
</body>
</html>
